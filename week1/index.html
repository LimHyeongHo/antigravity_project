<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 첫번째 아이디어</title>
    <meta name="description" content="내 첫번째 아이디어를 보여주는 웹페이지입니다.">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="main-header">
        <h2 class="header-title">나의 첫 서비스</h2>
        <nav class="header-nav">
            <a href="#" class="nav-item">소개</a>
            <a href="#" class="nav-item">기능</a>
            <a href="#" class="nav-item">문의</a>
        </nav>
    </header>
    <main class="container">
        <!-- 핵심 기능 소개 섹션 -->
        <section class="section-container">
            <h3 class="section-title">핵심 기능 소개</h3>
            <div class="glass-panel">
                <h1 class="main-text">내 첫번째 아이디어</h1>
                <button class="next-btn" id="nextBtn">다음 문장보기</button>
                <div class="glow"></div>
            </div>
        </section>

        <!-- 사용자 후기 섹션 -->
        <section class="section-container">
            <h3 class="section-title">사용자 후기</h3>
            <div class="reviews-grid">
                <div class="glass-panel review-card">
                    <div class="review-header">
                        <img src="user_profile_1.png" alt="김민준 프로필" class="profile-img">
                        <div class="user-info">
                            <h4 class="user-name">김민준</h4>
                            <p class="user-role">프론트엔드 개발자</p>
                        </div>
                    </div>
                    <p class="review-text">"디자인이 너무 세련되고 모션이 부드럽습니다. 계속 써보고 싶은 매력이 있네요!"</p>
                </div>
                <div class="glass-panel review-card">
                    <div class="review-header">
                        <img src="user_profile_2.png" alt="이지은 프로필" class="profile-img">
                        <div class="user-info">
                            <h4 class="user-name">이지은</h4>
                            <p class="user-role">UI/UX 디자이너</p>
                        </div>
                    </div>
                    <p class="review-text">"글래스모피즘과 파스텔 톤 배경의 매치가 완성도 높습니다. 문장 애니메이션 리셋 기능이 마음에 들어요."</p>
                </div>
            </div>
        </section>
    </main>
    <footer class="main-footer">
        <p class="footer-text">&copy; 2026 My service</p>
    </footer>
    <script>
        const sentences = [
            "내 첫번째 아이디어",
            "오늘도 해냈어요!",
            "조금씩 나아지고 있어요.",
            "이대로 계속 가봅시다."
        ];
        const buttonClasses = ["", "btn-yellow", "btn-orange", "btn-green"];
        let currentIndex = 0;

        const textEl = document.querySelector('.main-text');
        const btnEl = document.getElementById('nextBtn');

        btnEl.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % sentences.length;

            // Premium animation reset: triggers the slideUp transition again on text change
            textEl.style.animation = 'none';
            textEl.offsetHeight; // Trigger reflow to restart animation
            textEl.style.animation = 'slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards';

            textEl.textContent = sentences[currentIndex];

            // Reset button classes to base next-btn class
            btnEl.className = "next-btn";

            // Add new color class if defined
            const newClass = buttonClasses[currentIndex];
            if (newClass) {
                btnEl.classList.add(newClass);
            }
        });
    </script>
</body>

</html>
